overrides:
  vite: ^8.0.13
  esbuild: latest

patchedDependencies:
  nuxt-monaco-editor: patches/nuxt-monaco-editor.patch

allowBuilds:
  '@parcel/watcher': false
  '@rolldown/browser': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@nuxt/kit@4.4.6'
  - '@nuxt/nitro-server@4.4.6'
  - '@nuxt/schema@4.4.6'
  - '@nuxt/vite-builder@4.4.6'
  - '@vue/language-core@3.3.0'
  - nuxt@4.4.6
  - vue-tsc@3.3.0
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 604800 # 7 days
